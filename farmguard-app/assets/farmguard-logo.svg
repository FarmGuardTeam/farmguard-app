<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Shield shape -->
  <path d="M12 8 L38 2 L64 8 L64 38 Q64 58 38 70 Q12 58 12 38 Z" fill="#2D5016" stroke="#4A7C23" stroke-width="1.5"/>
  <!-- Wheat stalk inside shield -->
  <line x1="38" y1="60" x2="38" y2="20" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
  <!-- Wheat kernels - left -->
  <ellipse cx="33" cy="24" rx="4" ry="7" fill="#D4A843" transform="rotate(-20 33 24)" opacity="0.9"/>
  <ellipse cx="33" cy="36" rx="4" ry="7" fill="#D4A843" transform="rotate(-20 33 36)" opacity="0.9"/>
  <ellipse cx="34" cy="48" rx="3.5" ry="6" fill="#D4A843" transform="rotate(-15 34 48)" opacity="0.8"/>
  <!-- Wheat kernels - right -->
  <ellipse cx="43" cy="24" rx="4" ry="7" fill="#D4A843" transform="rotate(20 43 24)" opacity="0.9"/>
  <ellipse cx="43" cy="36" rx="4" ry="7" fill="#D4A843" transform="rotate(20 43 36)" opacity="0.9"/>
  <ellipse cx="42" cy="48" rx="3.5" ry="6" fill="#D4A843" transform="rotate(15 42 48)" opacity="0.8"/>
  <!-- Top kernel -->
  <ellipse cx="38" cy="18" rx="3" ry="5" fill="#D4A843" opacity="0.9"/>
  <!-- Checkmark overlay on shield -->
  <polyline points="26,38 34,46 52,26" fill="none" stroke="#FAFAF5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  <!-- Text: FARM -->
  <text x="76" y="42" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#2D5016" letter-spacing="1">FARM</text>
  <!-- Text: GUARD -->
  <text x="178" y="42" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#4A7C23" letter-spacing="1">GUARD</text>
  <!-- Tagline -->
  <text x="77" y="60" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#8A8A7A" letter-spacing="2.5">INDEPENDENT POLICY AUDIT</text>
</svg>
