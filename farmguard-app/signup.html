<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | FarmGuard</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="logo-wrap">
        <a href="/"><img src="/assets/farmguard-logo.svg" alt="FarmGuard"></a>
      </div>
      <h1>Create Your Account</h1>
      <p class="auth-sub">Sign up to start your independent policy audit.</p>

      <div id="alertArea"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="John Smith" required>
        </div>
        <div class="form-group">
          <label for="farmName">Farm / Business Name</label>
          <input type="text" id="farmName" placeholder="Smith Family Farms">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@farm.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="(555) 123-4567">
        </div>
        <div class="form-group">
          <label for="state">State</label>
          <select id="state" required>
            <option value="">Select your state</option>
            <option value="AL">Alabama</option><option value="AR">Arkansas</option>
            <option value="AZ">Arizona</option><option value="CA">California</option>
            <option value="CO">Colorado</option><option value="GA">Georgia</option>
            <option value="IA">Iowa</option><option value="ID">Idaho</option>
            <option value="IL">Illinois</option><option value="IN">Indiana</option>
            <option value="KS">Kansas</option><option value="KY">Kentucky</option>
            <option value="LA">Louisiana</option><option value="MI">Michigan</option>
            <option value="MN">Minnesota</option><option value="MO">Missouri</option>
            <option value="MS">Mississippi</option><option value="MT">Montana</option>
            <option value="NC">North Carolina</option><option value="ND">North Dakota</option>
            <option value="NE">Nebraska</option><option value="NY">New York</option>
            <option value="OH">Ohio</option><option value="OK">Oklahoma</option>
            <option value="OR">Oregon</option><option value="PA">Pennsylvania</option>
            <option value="SC">South Carolina</option><option value="SD">South Dakota</option>
            <option value="TN">Tennessee</option><option value="TX">Texas</option>
            <option value="VA">Virginia</option><option value="WA">Washington</option>
            <option value="WI">Wisconsin</option><option value="WY">Wyoming</option>
          </select>
        </div>
        <div class="form-group">
          <label for="password">Create Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
          Create Free Account
        </button>
      </form>

      <div class="form-switch">
        Already have an account? <a href="/signin.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/supabase-config.js"></script>
  <script>
    // Redirect if already logged in
    redirectIfAuthed();

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account...';

      const fullName = document.getElementById('fullName').value.trim();
      const farmName = document.getElementById('farmName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const state = document.getElementById('state').value;
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              full_name: fullName,
              farm_name: farmName,
              phone: phone,
              state: state
            }
          }
        });

        if (error) throw error;

        if (data.user && !data.user.confirmed_at && data.user.identities?.length === 0) {
          showAlert(document.getElementById('alertArea'), 'error', 'An account with this email already exists.');
        } else if (data.session) {
          // Auto-confirmed, go to dashboard
          window.location.href = '/dashboard.html';
        } else {
          // Email confirmation required
          showAlert(document.getElementById('alertArea'), 'success',
            'Account created! Check your email for a confirmation link, then sign in.');
          document.getElementById('signupForm').reset();
        }
      } catch (err) {
        showAlert(document.getElementById('alertArea'), 'error', err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Free Account';
      }
    });
  </script>
</body>
</html>
