<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | FarmGuard</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .admin-finding { padding: 20px; background: var(--cream); border-radius: 8px; margin-bottom: 16px; border-left: 4px solid var(--border); }
    .admin-finding.severity-critical { border-left-color: #D32F2F; }
    .admin-finding.severity-warning { border-left-color: #F9A825; }
    .admin-finding.severity-ok { border-left-color: var(--green-mid); }
    .admin-finding textarea { margin-top: 4px; }
    .finding-controls { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .severity-select { padding: 8px 12px; border-radius: 6px; border: 1.5px solid var(--border); font-family: inherit; font-size: 14px; }
    .doc-thumb { width: 120px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; }
    .admin-tab { padding: 10px 20px; border: none; background: none; font-size: 15px; font-weight: 500; cursor: pointer; color: var(--text-light); border-bottom: 2px solid transparent; font-family: inherit; }
    .admin-tab.active { color: var(--green-dark); border-bottom-color: var(--green-mid); }
    .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .field-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); margin-bottom: 2px; margin-top: 10px; }
    .impact-banner { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: linear-gradient(135deg, var(--green-dark), var(--green-mid)); color: white; border-radius: 8px; margin-bottom: 16px; }
    .impact-banner .impact-number { font-size: 28px; font-weight: 800; }
    .impact-banner .impact-label { font-size: 14px; opacity: 0.9; }

    /* AI Analysis Progress Tracker */
    .analysis-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.55); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .analysis-modal {
      background: #fff; border-radius: 12px; padding: 32px 36px;
      max-width: 520px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .analysis-modal h3 {
      font-size: 20px; color: var(--green-dark); margin: 0 0 4px; display: flex; align-items: center; gap: 10px;
    }
    .analysis-modal .subtitle { font-size: 14px; color: var(--text-light); margin: 0 0 20px; }
    .progress-track {
      width: 100%; height: 14px; background: #E8E8E4; border-radius: 7px; overflow: hidden; margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%; width: 0%; border-radius: 7px;
      background: linear-gradient(90deg, #4A7C23, #6BAF3A);
      transition: width 0.6s ease;
    }
    .progress-pct {
      font-size: 13px; font-weight: 700; color: var(--green-dark); text-align: right; margin-bottom: 18px;
    }
    .step-list { list-style: none; padding: 0; margin: 0; }
    .step-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; font-size: 14px; color: var(--text-light);
      border-bottom: 1px solid #F0F0EC;
    }
    .step-list li:last-child { border-bottom: none; }
    .step-list li .step-icon {
      width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0; border: 2px solid #D0D0CC; color: #D0D0CC; background: #fff;
    }
    .step-list li.active { color: var(--green-dark); font-weight: 600; }
    .step-list li.active .step-icon {
      border-color: var(--green-mid); color: var(--green-mid); background: #F0F7EC;
      animation: pulse-icon 1.2s ease-in-out infinite;
    }
    .step-list li.done { color: var(--text-mid); }
    .step-list li.done .step-icon {
      border-color: var(--green-mid); background: var(--green-mid); color: #fff;
    }
    @keyframes pulse-icon {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74,124,35,0.3); }
      50% { box-shadow: 0 0 0 6px rgba(74,124,35,0); }
    }
    .analysis-error { color: #D32F2F; font-size: 14px; margin-top: 12px; font-weight: 500; }
    .analysis-result {
      margin-top: 16px; padding: 16px; border-radius: 8px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color: #fff; text-align: center;
    }
    .analysis-result .result-number { font-size: 28px; font-weight: 800; }
    .analysis-result .result-label { font-size: 13px; opacity: 0.9; }
  </style>
</head>
<body>
  <!-- TOPBAR -->
  <nav class="topbar">
    <div class="topbar-inner">
      <a href="/admin.html" class="topbar-logo">
        <img src="/assets/farmguard-logo.svg" alt="FarmGuard">
      </a>
      <div class="topbar-right">
        <span class="badge badge-review">Admin Panel</span>
        <button class="btn btn-outline btn-sm" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  </nav>

  <div style="max-width:1000px; margin:0 auto; padding:32px 20px;">
    <h1 style="font-size:28px; color:var(--green-dark); margin-bottom:8px;">Admin Dashboard</h1>
    <p style="font-size:16px; color:var(--text-mid); margin-bottom:24px;">Review AI findings, edit reports, and approve audits for delivery.</p>

    <div id="alertArea"></div>

    <!-- TABS -->
    <div class="tab-bar">
      <button class="admin-tab active" onclick="switchTab('queue')">Audit Queue</button>
      <button class="admin-tab" onclick="switchTab('review')">Review Audit</button>
      <button class="admin-tab" onclick="switchTab('stats')">Stats</button>
    </div>

    <!-- QUEUE TAB -->
    <div id="queueTab">
      <div class="card">
        <div class="card-header">
          <h2>Audits Awaiting Review</h2>
          <button class="btn btn-outline btn-sm" onclick="loadQueue()">Refresh</button>
        </div>
        <div id="auditQueue">
          <p style="text-align:center; padding:32px; color:var(--text-light);">Loading...</p>
        </div>
      </div>
    </div>

    <!-- REVIEW TAB -->
    <div id="reviewTab" style="display:none;">
      <div id="reviewContent">
        <p style="text-align:center; padding:48px; color:var(--text-light);">Select an audit from the queue to review.</p>
      </div>
    </div>

    <!-- STATS TAB -->
    <div id="statsTab" style="display:none;">
      <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px;">
        <div class="card" style="padding:20px; text-align:center;">
          <div style="font-size:13px; color:var(--text-light); text-transform:uppercase;">Total Audits</div>
          <div id="totalAudits" style="font-size:32px; font-weight:800; color:var(--green-dark);">-</div>
        </div>
        <div class="card" style="padding:20px; text-align:center;">
          <div style="font-size:13px; color:var(--text-light); text-transform:uppercase;">Pending Review</div>
          <div id="pendingReview" style="font-size:32px; font-weight:800; color:#8B6914;">-</div>
        </div>
        <div class="card" style="padding:20px; text-align:center;">
          <div style="font-size:13px; color:var(--text-light); text-transform:uppercase;">Completed</div>
          <div id="completedAudits" style="font-size:32px; font-weight:800; color:var(--green-mid);">-</div>
        </div>
        <div class="card" style="padding:20px; text-align:center;">
          <div style="font-size:13px; color:var(--text-light); text-transform:uppercase;">Revenue</div>
          <div id="totalRevenue" style="font-size:32px; font-weight:800; color:var(--green-dark);">-</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/supabase-config.js"></script>
  <script>
    // ADMIN EMAIL - only this email can access the admin panel
    const ADMIN_EMAIL = 'brandonmgilles@gmail.com';

    let currentUser = null;
    let currentAudit = null;

    async function init() {
      currentUser = await requireAuth();
      if (!currentUser) return;

      // Admin check
      if (currentUser.email !== ADMIN_EMAIL) {
        document.body.innerHTML = '<div style="text-align:center;padding:80px 20px;"><h1 style="color:var(--red-soft);">Access Denied</h1><p>This page is restricted to admin users.</p><a href="/dashboard.html">Go to Dashboard</a></div>';
        return;
      }

      await loadQueue();
      await loadStats();
    }

    function switchTab(tab) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-bar .admin-tab').forEach((t, i) => {
        if ((tab === 'queue' && i === 0) || (tab === 'review' && i === 1) || (tab === 'stats' && i === 2)) t.classList.add('active');
      });
      document.getElementById('queueTab').style.display = tab === 'queue' ? 'block' : 'none';
      document.getElementById('reviewTab').style.display = tab === 'review' ? 'block' : 'none';
      document.getElementById('statsTab').style.display = tab === 'stats' ? 'block' : 'none';
    }

    async function loadQueue() {
      const { data: audits, error } = await supabase
        .from('audits')
        .select('*')
        .in('status', ['submitted', 'ai_analysis', 'admin_review', 'under_review'])
        .order('created_at', { ascending: true });

      if (error) { console.error(error); return; }

      const container = document.getElementById('auditQueue');
      if (!audits || audits.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:32px; color:var(--text-light);">No audits in the queue. All caught up!</p>';
        return;
      }

      container.innerHTML = audits.map(a => `
        <div class="audit-queue-item">
          <div class="queue-info">
            <h4>${a.farm_name || 'Unknown Farm'} <span style="font-weight:400; color:var(--text-light); font-size:13px;">${a.audit_id}</span></h4>
            <p>${a.crops || ''} &middot; ${a.acres ? a.acres + ' acres' : ''} &middot; ${a.state || ''} &middot; Submitted ${formatDate(a.created_at)}</p>
          </div>
          <div class="queue-actions">
            <span class="badge ${statusBadgeClass(a.status)}">${statusLabel(a.status)}</span>
            <button class="btn btn-primary btn-sm" onclick="openReview('${a.id}')">Review</button>
          </div>
        </div>
      `).join('');
    }

    async function loadStats() {
      const { data: all } = await supabase.from('audits').select('status, paid');
      if (!all) return;
      document.getElementById('totalAudits').textContent = all.length;
      document.getElementById('pendingReview').textContent = all.filter(a => ['submitted', 'ai_analysis', 'admin_review', 'under_review'].includes(a.status)).length;
      document.getElementById('completedAudits').textContent = all.filter(a => a.status === 'complete').length;
      document.getElementById('totalRevenue').textContent = '$' + (all.filter(a => a.paid).length * 29.99).toFixed(2);
    }

    async function openReview(id) {
      switchTab('review');
      const audit = await getAudit(id);
      currentAudit = audit;

      const docs = await getAuditDocuments(id);
      const questionnaire = await getQuestionnaireResponses(id);
      const findings = await getAuditFindings(id);

      const container = document.getElementById('reviewContent');
      container.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <div>
            <h2 style="font-size:22px; color:var(--green-dark);">${audit.farm_name || 'Unknown'} — ${audit.audit_id}</h2>
            <p style="font-size:14px; color:var(--text-light);">${audit.crops || ''} &middot; ${audit.acres || ''} acres &middot; ${audit.county || ''}, ${audit.state || ''}</p>
          </div>
          <span class="badge ${statusBadgeClass(audit.status)}">${statusLabel(audit.status)}</span>
        </div>

        <!-- Documents -->
        <div class="card" style="margin-bottom:20px;">
          <h3 style="font-size:17px; color:var(--green-dark); margin-bottom:12px;">Uploaded Documents (${docs.length})</h3>
          <div style="display:flex; flex-wrap:wrap; gap:12px;">
            ${docs.map(d => `
              <div style="padding:12px; background:var(--cream); border-radius:8px; display:flex; align-items:center; gap:10px;">
                <span style="font-size:20px;">${d.file_name?.match(/\.(jpg|jpeg|png)$/i) ? '&#128247;' : '&#128196;'}</span>
                <div>
                  <div style="font-size:14px; font-weight:500;">${d.file_name}</div>
                  <div style="font-size:12px; color:var(--text-light);">${formatFileSize(d.file_size)}</div>
                </div>
                <a href="#" onclick="viewDoc('${d.file_path}'); return false;" style="font-size:13px; font-weight:600;">View</a>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- Questionnaire Responses -->
        <div class="card" style="margin-bottom:20px;">
          <h3 style="font-size:17px; color:var(--green-dark); margin-bottom:12px;">Questionnaire Responses</h3>
          ${questionnaire?.responses ? renderResponses(questionnaire.responses) : '<p style="color:var(--text-light);">No questionnaire responses.</p>'}
        </div>

        <!-- AI Findings -->
        <div class="card" style="margin-bottom:20px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h3 style="font-size:17px; color:var(--green-dark);">Findings (${findings.length})</h3>
            <div style="display:flex; gap:8px;">
              <button class="btn btn-primary btn-sm" onclick="runAIAnalysis('${id}')">&#9889; Run AI Analysis</button>
              <button class="btn btn-outline btn-sm" onclick="addFinding('${id}')">+ Add Finding</button>
            </div>
          </div>

          ${findings.length > 0 ? `
            <div class="impact-banner">
              <div>
                <div class="impact-number">$${findings.reduce((sum, f) => sum + (f.estimated_impact || 0), 0).toLocaleString()}</div>
                <div class="impact-label">Total Estimated Impact</div>
              </div>
              <div style="margin-left:auto; text-align:right;">
                <div style="font-size:20px; font-weight:700;">${findings.filter(f => f.severity === 'critical').length} Critical</div>
                <div style="font-size:14px; opacity:0.9;">${findings.filter(f => f.severity === 'warning').length} Warnings &middot; ${findings.filter(f => f.severity === 'ok').length} OK</div>
              </div>
            </div>
          ` : ''}

          <div id="findingsEditor">
            ${findings.length === 0 ? '<p style="color:var(--text-light);">No findings yet. Run AI Analysis or add findings manually.</p>' : ''}
            ${findings.map((f, i) => renderFindingEditor(f, i)).join('')}
          </div>
        </div>

        <!-- Executive Summary -->
        <div class="card" style="margin-bottom:20px;">
          <h3 style="font-size:17px; color:var(--green-dark); margin-bottom:4px;">Executive Summary</h3>
          <p style="font-size:13px; color:var(--text-light); margin-bottom:12px;">This summary will be shown directly to the farmer at the top of their report. Review and edit before approving.</p>
          <div class="form-group" style="margin-bottom:0;">
            <textarea id="execSummary" rows="10" placeholder="The AI will draft this automatically when you run analysis. Review and edit before sending to the farmer...">${escapeHtml(audit.executive_summary || '')}</textarea>
          </div>
        </div>

        <!-- Actions -->
        <div style="display:flex; gap:12px; justify-content:flex-end;">
          <button class="btn btn-outline" onclick="saveProgress('${id}')">Save Progress</button>
          <button class="btn btn-gold" onclick="approveAudit('${id}')">Approve & Send to Customer</button>
        </div>
      `;
    }

    function renderResponses(responses) {
      const labels = {
        insurance_type: 'Insurance Type',
        coverage_level: 'Coverage Level',
        unit_structure: 'Unit Structure',
        irrigation: 'Irrigation',
        following_crop: 'Double Cropping',
        supplemental: 'Supplemental Coverage',
        prevented_planting: 'Prevented Planting Claims',
        concerns: 'Customer Concerns',
        aph_notes: 'APH Notes',
        additional_info: 'Additional Info'
      };
      return Object.entries(responses)
        .filter(([k, v]) => v && (Array.isArray(v) ? v.length > 0 : v.trim()))
        .map(([k, v]) => `
          <div style="display:flex; gap:12px; padding:8px 0; border-bottom:1px solid var(--cream);">
            <strong style="font-size:14px; color:var(--text-dark); min-width:160px;">${labels[k] || k}:</strong>
            <span style="font-size:14px; color:var(--text-mid);">${Array.isArray(v) ? v.join(', ') : v}</span>
          </div>
        `).join('');
    }

    function renderFindingEditor(finding, index) {
      const severityColors = { critical: '#D32F2F', warning: '#F9A825', ok: '#4A7C23' };
      const severityLabels = { critical: 'CRITICAL', warning: 'WARNING', ok: 'OK' };
      return `
        <div class="admin-finding severity-${finding.severity || 'warning'}" id="finding-${finding.id}">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
            <strong style="font-size:16px; color:var(--green-dark);">Finding #${index + 1}</strong>
            <div style="display:flex; align-items:center; gap:12px;">
              <select class="severity-select" onchange="updateFindingSeverity('${finding.id}', this.value); this.closest('.admin-finding').className='admin-finding severity-'+this.value;">
                <option value="critical" ${finding.severity === 'critical' ? 'selected' : ''}>Critical</option>
                <option value="warning" ${finding.severity === 'warning' ? 'selected' : ''}>Warning</option>
                <option value="ok" ${finding.severity === 'ok' ? 'selected' : ''}>OK / Informational</option>
              </select>
              <button class="btn btn-danger btn-sm" onclick="deleteFinding('${finding.id}')" style="font-size:12px;">Delete</button>
            </div>
          </div>

          <div class="field-label">Title</div>
          <div class="form-group" style="margin:0 0 0;">
            <input type="text" value="${escapeHtml(finding.title || '')}" placeholder="Clear, specific title of the finding" onchange="updateFindingField('${finding.id}', 'title', this.value)">
          </div>

          <div class="field-label">What Was Found</div>
          <div class="form-group" style="margin:0 0 0;">
            <textarea rows="3" placeholder="Detailed description — what's on the policy now vs. what it should be, with specific numbers..." onchange="updateFindingField('${finding.id}', 'description', this.value)">${escapeHtml(finding.description || '')}</textarea>
          </div>

          <div class="field-label">Why It Matters (Financial Impact)</div>
          <div class="form-group" style="margin:0 0 0;">
            <textarea rows="3" placeholder="Dollar impact explanation — what this costs the farmer, what happens in a loss year if not fixed..." onchange="updateFindingField('${finding.id}', 'why_it_matters', this.value)">${escapeHtml(finding.why_it_matters || '')}</textarea>
          </div>

          <div class="field-label">Script for Agent Conversation</div>
          <div class="form-group" style="margin:0 0 0;">
            <textarea rows="3" placeholder="First-person script the farmer can use with their agent: 'I'd like to discuss switching my corn from...'" onchange="updateFindingField('${finding.id}', 'agent_language', this.value)">${escapeHtml(finding.agent_language || '')}</textarea>
          </div>

          <div class="field-label">Estimated Cost Impact ($)</div>
          <div class="form-group" style="margin:0 0 0;">
            <input type="number" value="${finding.estimated_impact || ''}" placeholder="e.g. 2350" style="max-width:200px;" onchange="updateFindingField('${finding.id}', 'estimated_impact', parseInt(this.value) || 0)">
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function viewDoc(filePath) {
      const url = await getDocumentUrl(filePath);
      window.open(url, '_blank');
    }

    // ===================== AI ANALYSIS WITH PROGRESS TRACKER =====================

    const ANALYSIS_STEPS = [
      { id: 'upload', label: 'Preparing documents for review', duration: 3000 },
      { id: 'schedule', label: 'Reviewing Schedule of Insurance line by line', duration: 12000 },
      { id: 'practice', label: 'Verifying practice codes & unit structure', duration: 10000 },
      { id: 'aph', label: 'Auditing APH yields & checking for T-yields', duration: 12000 },
      { id: 'ye', label: 'Checking Yield Exclusion eligibility', duration: 8000 },
      { id: 'cost', label: 'Calculating dollar impact for each finding', duration: 8000 },
      { id: 'scripts', label: 'Drafting agent conversation scripts', duration: 6000 },
      { id: 'summary', label: 'Writing executive summary', duration: 5000 },
    ];

    function showAnalysisProgress() {
      // Remove existing overlay if present
      const existing = document.getElementById('analysisOverlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.className = 'analysis-overlay';
      overlay.id = 'analysisOverlay';
      overlay.innerHTML = `
        <div class="analysis-modal">
          <h3><span id="analysisSpinner" style="display:inline-block; width:22px; height:22px; border:3px solid #E8E8E4; border-top-color:var(--green-mid); border-radius:50%; animation:spin 0.8s linear infinite;"></span> AI Analysis in Progress</h3>
          <p class="subtitle" id="analysisSubtitle">Reviewing your policy documents — this usually takes 60–90 seconds.</p>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-pct" id="progressPct">0%</div>
          <ul class="step-list" id="stepList">
            ${ANALYSIS_STEPS.map((s, i) => `
              <li id="step-${s.id}" class="${i === 0 ? 'active' : ''}">
                <span class="step-icon">${i === 0 ? '&#9679;' : (i + 1)}</span>
                <span>${s.label}</span>
              </li>
            `).join('')}
          </ul>
          <div id="analysisResultArea"></div>
        </div>
      `;
      // Add spin keyframes if not already present
      if (!document.getElementById('spinKeyframes')) {
        const style = document.createElement('style');
        style.id = 'spinKeyframes';
        style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
        document.head.appendChild(style);
      }
      document.body.appendChild(overlay);
    }

    function advanceStep(stepIndex, percent) {
      const fill = document.getElementById('progressFill');
      const pct = document.getElementById('progressPct');
      if (fill) fill.style.width = percent + '%';
      if (pct) pct.textContent = Math.round(percent) + '%';

      ANALYSIS_STEPS.forEach((s, i) => {
        const li = document.getElementById('step-' + s.id);
        if (!li) return;
        if (i < stepIndex) {
          li.className = 'done';
          li.querySelector('.step-icon').innerHTML = '&#10003;';
        } else if (i === stepIndex) {
          li.className = 'active';
          li.querySelector('.step-icon').innerHTML = '&#9679;';
        } else {
          li.className = '';
          li.querySelector('.step-icon').innerHTML = (i + 1);
        }
      });
    }

    function showAnalysisComplete(result) {
      // Mark all steps done
      advanceStep(ANALYSIS_STEPS.length, 100);

      const spinner = document.getElementById('analysisSpinner');
      if (spinner) spinner.outerHTML = '<span style="font-size:22px;">&#9989;</span>';

      const subtitle = document.getElementById('analysisSubtitle');
      if (subtitle) subtitle.textContent = 'Analysis complete — review the findings below.';

      const area = document.getElementById('analysisResultArea');
      if (area) {
        area.innerHTML = `
          <div class="analysis-result">
            <div class="result-number">${result.findings_count || 0} Findings</div>
            <div class="result-label">${result.total_impact ? 'Estimated Impact: $' + result.total_impact.toLocaleString() : 'Review findings below'}${result.has_summary ? ' &middot; Executive summary drafted' : ''}</div>
          </div>
          <button class="btn btn-primary btn-block" style="margin-top:14px;" onclick="document.getElementById('analysisOverlay').remove();">Review Findings</button>
        `;
      }
    }

    function showAnalysisError(message) {
      const spinner = document.getElementById('analysisSpinner');
      if (spinner) spinner.outerHTML = '<span style="font-size:22px;">&#10060;</span>';

      const subtitle = document.getElementById('analysisSubtitle');
      if (subtitle) subtitle.textContent = 'Analysis encountered an error.';

      const area = document.getElementById('analysisResultArea');
      if (area) {
        area.innerHTML = `
          <div class="analysis-error">&#9888; ${message}</div>
          <button class="btn btn-outline btn-block" style="margin-top:14px;" onclick="document.getElementById('analysisOverlay').remove();">Close</button>
        `;
      }
    }

    async function runAIAnalysis(auditId) {
      showAnalysisProgress();

      // Start simulated step progression (advances visually while the API works)
      let currentStep = 0;
      const totalDuration = ANALYSIS_STEPS.reduce((s, step) => s + step.duration, 0);
      let elapsed = 0;

      const stepTimer = setInterval(() => {
        if (currentStep >= ANALYSIS_STEPS.length - 1) {
          clearInterval(stepTimer);
          return;
        }
        elapsed += 500;
        // Calculate cumulative time through steps
        let cumulative = 0;
        for (let i = 0; i <= currentStep; i++) cumulative += ANALYSIS_STEPS[i].duration;

        if (elapsed >= cumulative) {
          currentStep++;
          const pct = Math.min((elapsed / totalDuration) * 95, 95); // Cap at 95% until real response
          advanceStep(currentStep, pct);
        } else {
          // Smooth progress within current step
          const stepStart = cumulative - ANALYSIS_STEPS[currentStep].duration;
          const stepProgress = (elapsed - stepStart) / ANALYSIS_STEPS[currentStep].duration;
          const basePercent = (stepStart / totalDuration) * 95;
          const stepPercent = (ANALYSIS_STEPS[currentStep].duration / totalDuration) * 95 * stepProgress;
          advanceStep(currentStep, basePercent + stepPercent);
        }
      }, 500);

      try {
        await updateAuditStatus(auditId, 'ai_analysis');

        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audit_id: auditId })
        });

        clearInterval(stepTimer);

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || 'AI analysis failed (status ' + response.status + ')');
        }

        const result = await response.json();
        showAnalysisComplete(result);

        // Reload the review panel in the background
        await openReview(auditId);

      } catch (err) {
        clearInterval(stepTimer);
        showAnalysisError(err.message);
      }
    }

    async function addFinding(auditId) {
      const { data, error } = await supabase
        .from('findings')
        .insert({
          audit_id: auditId,
          title: '',
          description: '',
          severity: 'warning',
          created_at: new Date().toISOString()
        })
        .select()
        .single();
      if (error) { alert('Error: ' + error.message); return; }
      await openReview(auditId);
    }

    async function updateFindingField(findingId, field, value) {
      await supabase.from('findings').update({ [field]: value }).eq('id', findingId);
    }

    async function updateFindingSeverity(findingId, value) {
      await supabase.from('findings').update({ severity: value }).eq('id', findingId);
    }

    async function deleteFinding(findingId) {
      if (!confirm('Delete this finding?')) return;
      await supabase.from('findings').delete().eq('id', findingId);
      await openReview(currentAudit.id);
    }

    async function saveProgress(auditId) {
      const summary = document.getElementById('execSummary').value.trim();
      await supabase.from('audits').update({ executive_summary: summary, status: 'admin_review' }).eq('id', auditId);
      showAlert(document.getElementById('alertArea'), 'success', 'Progress saved.');
    }

    async function approveAudit(auditId) {
      if (!confirm('Approve this audit and make the report available to the customer? They will be prompted to pay $29.99 to view it.')) return;

      const summary = document.getElementById('execSummary').value.trim();

      // Save summary first
      await supabase.from('audits').update({
        executive_summary: summary,
        status: 'payment_pending',
        report_ready_at: new Date().toISOString()
      }).eq('id', auditId);

      // Generate PDF report
      showAlert(document.getElementById('alertArea'), 'info', 'Generating PDF report...');
      try {
        const pdfRes = await fetch('/api/generate-report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audit_id: auditId })
        });
        if (pdfRes.ok) {
          const pdfResult = await pdfRes.json();
          showAlert(document.getElementById('alertArea'), 'success', 'PDF generated successfully.');
        } else {
          showAlert(document.getElementById('alertArea'), 'warning', 'PDF generation failed. Customer can still view the web report.');
        }
      } catch (pdfErr) {
        console.error('PDF generation error:', pdfErr);
      }

      // Send "report ready" email to customer
      try {
        const audit = await getAudit(auditId);
        // Get customer email from Supabase auth
        const { data: userData } = await supabase.auth.admin.getUserById(audit.user_id);
        const customerEmail = userData?.user?.email;

        if (customerEmail) {
          showAlert(document.getElementById('alertArea'), 'info', 'Sending notification email...');
          const emailRes = await fetch('/api/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ to: customerEmail, type: 'report_ready', audit: audit })
          });
          if (emailRes.ok) {
            showAlert(document.getElementById('alertArea'), 'success', 'Audit approved, PDF generated, and customer notified by email!');
          }
        } else {
          showAlert(document.getElementById('alertArea'), 'success', 'Audit approved & PDF generated! (Could not send email — customer email not found.)');
        }
      } catch (emailErr) {
        console.error('Email notification error:', emailErr);
        showAlert(document.getElementById('alertArea'), 'success', 'Audit approved & PDF generated! Email notification could not be sent.');
      }

      await loadQueue();
      switchTab('queue');
    }

    init();
  </script>
